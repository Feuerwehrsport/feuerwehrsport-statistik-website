production:
  clear_solid_queue_finished_jobs:
    command: "SolidQueue::Job.clear_finished_in_batches(sleep_between_batches: 0.3)"
    priority: 50
    schedule: '*/20 * * * *'

  solid_queue_debug:
    class: DebugJob
    priority: 10
    schedule: '*/20 * * * *'

  dump_database:
    class: DumpDatabaseJob
    priority: 20
    schedule: '42 3 * * *'
